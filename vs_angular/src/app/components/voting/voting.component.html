<div id="voting-pages">
  <div *ngIf="currentPosition">
    <h2>{{ currentPosition.position }}</h2>

    <div class="progress-bar-container">
      <div class="progress-bar" [style.width.%]="progress"></div>
    </div>
    <p class="progress-label">Position {{ currentPage + 1 }} of {{ votingData.length }}</p>

    <div class="candidate-row">
      <div
        *ngFor="let candidate of currentPosition.candidates"
        class="candidate"
        [class.selected]="selectedCandidate === candidate.name.toUpperCase()"
        (click)="selectCandidate(candidate.name.toUpperCase())"
      >
        <img
          [src]="getCandidateImageSrc(candidate.name)"
          [alt]="candidate.name"
          (error)="onImageError($event)"
        />
        <div class="candidate-info">
          <p><strong>{{ candidate.title }} {{ candidate.name.toUpperCase() }}</strong></p>
          <p>Candidate for {{ currentPosition.position }}</p>
        </div>
        <input
          type="radio"
          [name]="'vote-' + currentPage"
          [value]="candidate.name.toUpperCase()"
          [checked]="selectedCandidate === candidate.name.toUpperCase()"
          (change)="selectCandidate(candidate.name.toUpperCase())"
        />
      </div>

      <div
        *ngIf="isUnopposed"
        class="candidate"
        [class.selected]="selectedCandidate === 'NO'"
        (click)="selectCandidate('NO')"
      >
        <img src="/images/No.jpeg" alt="None of the Above" (error)="onImageError($event)" />
        <div class="candidate-info">
          <p><strong>NO</strong></p>
          <p>Reject candidate for {{ currentPosition.position }}</p>
        </div>
        <input
          type="radio"
          [name]="'vote-' + currentPage"
          value="NO"
          [checked]="selectedCandidate === 'NO'"
          (change)="selectCandidate('NO')"
        />
      </div>
    </div>

    <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button class="next-btn" (click)="next()" [disabled]="loading">
      {{ loading ? 'Submitting...' : (isLastPage ? 'Submit' : 'Next') }}
    </button>
  </div>

  <div *ngIf="loading" class="spinner-overlay">
    <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="18" stroke="#007bff" stroke-width="5" fill="none">
        <animate attributeName="stroke-dasharray" dur="2s" repeatCount="indefinite" values="1 150; 80 15; 1 150" />
        <animate attributeName="stroke-dashoffset" dur="2s" repeatCount="indefinite" values="0; -40; -120" />
      </circle>
    </svg>
  </div>
</div>
